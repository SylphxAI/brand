name: CI
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: read
jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON brand tokens
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          files=(**/*.json tokens/**/*.json docs/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JSON token files; structure present"
            ls -la
            exit 0
          fi
          python3 - <<'PY'
import json, pathlib, sys
errs=0
for p in pathlib.Path('.').rglob('*.json'):
  if any(part.startswith('.') for part in p.parts):
    continue
  try:
    json.loads(p.read_text())
    print('ok', p)
  except Exception as e:
    print('BAD', p, e)
    errs+=1
sys.exit(errs)
PY
